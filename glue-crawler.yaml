AWSTemplateFormatVersion: "2010-09-09"
Description: Create an AWS Glue crawler, catalogue, ETL job, Athena queries

Parameters:
  CityDBName:
    Type: String
    Default: "city-data-db"
  CityDataPath:
    Type: String
    Default: "city-data"
  CityDataProcessedPath:
    Type: String
    Default: "processed"
  CityDataFileName:
    Type: String
    Default: "CityData.csv"
  ScriptPath:
    Type: String
    Default: "scripts"
  CityDataProcessedTableName:
    Type: String
    Default: "city-data-processed"
  CityDataETLScriptName:
    Type: String
    Default: "city_etl.py"
  CityDataDQScriptName:
    Type: String
    Default: "city_dq.py"
  CityDataBucketName:
    Type: String
    Default: "com-in-context-data-load-staging"

Resources:
  CityDataS3BucketName:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref CityDataBucketName

  CityDataGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref CityDBName
        Description: Database for the data

  CityDataGlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CityDataCrawlerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueCrawlerS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !GetAtt CityDataS3BucketName.Arn
                  - !Sub "${CityDataS3BucketName.Arn}/*"

  CityDataCSVClassifier:
    Type: AWS::Glue::Classifier
    Properties:
      CsvClassifier:
        Name: CityDataCSVClassifier
        Delimiter: ","
        QuoteSymbol: "\""
        ContainsHeader: "PRESENT" # Other options: ABSENT, UNKNOWN
        # Optional properties for specific scenarios
        # AllowSingleColumn: true | false
        # DisableGlobalHeaders: true | false
        # HeaderDerivedCols: integer

  CityDataGlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: CityDataCrawler
      Role: !GetAtt CityDataGlueCrawlerRole.Arn
      DatabaseName: !Ref CityDataGlueDatabase
      Classifiers:
        - !Ref CityDataCSVClassifier
      Targets:
        S3Targets:
          - Path: !Sub "${CityDataS3BucketName}/${CityDataPath}/"
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: city-data-etl-job
      Description: "Replace nulls with 'n/a'"
      Role: !GetAtt CityDataGlueCrawlerRole.Arn
      GlueVersion: "5.0"
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${CityDataS3BucketName}/${ScriptPath}/${CityDataETLScriptName}"
        PythonVersion: "3.9"
      DefaultArguments:
        --job-bookmark-option: job-bookmark-enable
        --TempDir: !Sub "s3://${CityDataS3BucketName}/temp/"
        --enable-continuous-cloudwatch-log: "true"
        "--BUCKET_NAME": !Sub "s3://${CityDataS3BucketName}"
        "--DATA_FILE_LOCATION": !Ref CityDataPath
        "--DATA_FILE_NAME": !Ref CityDataFileName
        "--PROCESSED_DATA_LOCATION": !Ref CityDataProcessedPath
      ExecutionProperty:
        MaxConcurrentRuns: 1
      Timeout: 30
      MaxRetries: 0
      MaxCapacity: 1

  GlueDataQualityJob:
    Type: AWS::Glue::Job
    Properties:
      Name: city-data-quality-job
      Role: !GetAtt CityDataGlueCrawlerRole.Arn
      GlueVersion: "5.0"
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${CityDataS3BucketName}/${ScriptPath}/${CityDataDQScriptName}"
      DefaultArguments:
        --bucket_name: !Ref CityDataS3BucketName
        --file_path: !Sub "${CityDataProcessedPath}/city_data.parquet"
        --enable-glue-data-quality: "true"

  CityDataAthenaNamedQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Database: !Ref CityDataGlueDatabase
      Description: "Return the cities"
      Name: "ReturnCities"
      QueryString: >
        SELECT * FROM "city_data";
      WorkGroup: "primary" # Optional: specify a workgroup if needed

  ProcessedCityDataGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref CityDataGlueDatabase
      TableInput:
        Name: !Ref CityDataProcessedTableName
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: parquet
          EXTERNAL: true
        StorageDescriptor:
          Location: !Sub "s3://${CityDataS3BucketName}/${CityDataProcessedPath}/"
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          Compressed: false
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
          Columns:
            - Name: id
              Type: string
            - Name: country
              Type: string
            - Name: state
              Type: string
            - Name: city
              Type: string

  ProcessedCityDataAthenaNamedQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Database: !Ref CityDataGlueDatabase
      Description: "Return processed cities"
      Name: "ReturnProcessedCities"
      QueryString: !Sub "SELECT * FROM \"${CityDataProcessedTableName}\";"
      WorkGroup: "primary" # Optional: specify a workgroup if needed

  CityDataWorkflow:
    Type: AWS::Glue::Workflow
    Properties:
      Name: city-data-workflow

  StartCityDataPipelineTrigger:
    Type: AWS::Glue::Trigger
    Properties:
      Name: StartCityDataPipelineTrigger
      Description: Trigger to start the ETL script
      Type: ON_DEMAND
      WorkflowName: !Ref CityDataWorkflow
      Actions:
        - JobName: !Ref GlueETLJob

  RunDataQualityTrigger:
    Type: AWS::Glue::Trigger
    DependsOn:
      - GlueETLJob
      - GlueDataQualityJob
      - StartCityDataPipelineTrigger
    Properties:
      Name: RunDataQualityTrigger
      Type: CONDITIONAL
      StartOnCreation: true
      Description: Trigger to start Data Quality script after ETL script succeeds
      WorkflowName: !Ref CityDataWorkflow
      Predicate:
        Logical: AND
        Conditions:
          - JobName: !Ref GlueETLJob
            State: SUCCEEDED
            LogicalOperator: EQUALS
      Actions:
        - JobName: !Ref GlueDataQualityJob
          Arguments:
            --JOB_NAME: "RunDataQualityTrigger"
            --file_path: !Sub "${CityDataProcessedPath}/city_data.parquet/"
            --bucket_name: !Ref CityDataBucketName

Outputs:
  CrawlerName:
    Value: !Ref CityDataGlueCrawler
    Description: Name of the created Glue crawler

  DatabaseName:
    Value: !Ref CityDataGlueDatabase
    Description: Name of the created database
