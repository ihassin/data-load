AWSTemplateFormatVersion: "2010-09-09"
Description: Create an AWS Glue crawler, catalogue, ETL & Data quality jobs, Workflow, Athena queries

Parameters:
  CityDBName:
    Type: String
    Default: "city-data-db"
  CityDataPath:
    Type: String
    Default: "city-data"
  CityDataProcessedPath:
    Type: String
    Default: "processed"
  CityDataFileName:
    Type: String
    Default: "CityData.csv"
  ScriptPath:
    Type: String
    Default: "scripts"
  CityDataProcessedTableName:
    Type: String
    Default: "city-data-processed"
  CityDataETLScriptName:
    Type: String
    Default: "city_etl.py"
  CityDataDQScriptName:
    Type: String
    Default: "city_dq.py"
  CityDataBucketName:
    Type: String
    Default: "com-in-context-data-load-staging"
  ParquetPath:
    Type: String
    Default: "city_data.parquet"

Resources:
  CityDataS3BucketName:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref CityDataBucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  CityDataGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref CityDBName
        Description: Database for the data

#  EventBridgeGlueRole:
#    Type: AWS::IAM::Role
#    Properties:
#      RoleName: eventbridge-glue-workflow-role
#      AssumeRolePolicyDocument:
#        Version: "2012-10-17"
#        Statement:
#          - Effect: Allow
#            Principal:
#              Service: events.amazonaws.com
#            Action: sts:AssumeRole
#      Policies:
#        - PolicyName: allow-start-workflow
